version: "3.9"

# Local development stack. Production runs on GCP Cloud Run + Cloud SQL.

services:
  postgres:
    image: postgres:15-alpine
    container_name: axon-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-axon}
      POSTGRES_USER: ${POSTGRES_USER:-axon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axon_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - axon-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-axon} -d ${POSTGRES_DB:-axon}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  axon-postgres-data:
