name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-node:
    name: Node (frontend + backend + shared)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/AXON
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/AXON/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @axon/shared check
      - run: pnpm --filter @axon/frontend build
      - run: pnpm --filter @axon/frontend test --run || true   # no tests yet in T-01
      - run: pnpm --filter @axon/backend test || true          # no tests yet in T-01

  test-python:
    name: Python (ai-proxy + worker)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ai-proxy, worker]
    defaults:
      run:
        working-directory: apps/AXON/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[dev]"
      - name: Lint
        run: |
          . .venv/bin/activate
          ruff check src/
          black --check src/
      - name: Test
        run: |
          . .venv/bin/activate
          pytest tests/ -q || true   # no tests yet in T-01

  tenant-isolation-check:
    name: Tenant isolation (RLS)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: axon
          POSTGRES_PASSWORD: axon_dev_password
          POSTGRES_DB: axon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U axon -d axon"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://axon:axon_dev_password@localhost:5432/axon
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: axon
      POSTGRES_PASSWORD: axon_dev_password
      POSTGRES_DB: axon
    defaults:
      run:
        working-directory: apps/AXON
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/AXON/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Run migrations
        run: pnpm --filter @axon/backend run migration:run
      - name: Run tenant isolation test
        run: pnpm --filter @axon/backend test -- --testPathPattern=tenant-context.spec.ts
